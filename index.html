<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CompLoL Random | Squad Generator</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #c8aa6e; --gold-dark: #785a28; --blue: #0ac8b9; --bg: #010a13; --card-bg: rgba(1, 10, 19, 0.9); --glass: rgba(200, 170, 110, 0.1); }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: #f0e6d2; font-family: 'Inter', sans-serif; min-height: 100vh; background-image: url('bg.png'); background-size: cover; background-position: center; background-attachment: fixed; overflow-x: hidden; }
        body::before { content: ''; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: radial-gradient(circle, transparent 20%, var(--bg) 95%); pointer-events: none; }
        .container { position: relative; max-width: 1200px; margin: 0 auto; padding: 2rem; z-index: 1; }
        h1 { font-family: 'Cinzel', serif; text-align: center; color: var(--gold); font-size: 3.5rem; text-shadow: 0 0 30px rgba(200,170,110,0.4); margin-bottom: 2.5rem; letter-spacing: 6px; }
        .setup-card { background: var(--card-bg); border: 1px solid var(--gold-dark); padding: 2.5rem; border-radius: 4px; backdrop-filter: blur(15px); box-shadow: 0 0 50px rgba(0,0,0,0.9); max-width: 650px; margin: 0 auto; border-top: 2px solid var(--gold); }
        .form-group { margin-bottom: 2rem; }
        label { display: block; color: var(--gold); margin-bottom: 0.8rem; font-weight: bold; text-transform: uppercase; font-size: 0.85rem; letter-spacing: 1px; }
        input, select { width: 100%; background: rgba(0,0,0,0.6); border: 1px solid var(--gold-dark); color: white; padding: 1rem; border-radius: 2px; outline: none; transition: 0.3s; font-family: 'Inter'; }
        input:focus { border-color: var(--blue); box-shadow: 0 0 10px rgba(10, 200, 185, 0.2); }
        .btn { background: var(--gold-dark); color: #010a13; border: none; padding: 1.2rem; font-family: 'Cinzel', serif; font-weight: bold; cursor: pointer; transition: 0.4s; text-transform: uppercase; width: 100%; letter-spacing: 3px; font-size: 1rem; position: relative; overflow: hidden; }
        .btn:hover:not(:disabled) { background: var(--gold); box-shadow: 0 0 25px var(--gold); transform: translateY(-2px); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .player-row { display: grid; grid-template-columns: 1.5fr 1fr; gap: 1rem; margin-top: 1.2rem; padding-top: 1.2rem; border-top: 1px solid var(--glass); animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        #comp-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 1rem; margin-top: 1rem; }
        .team-title { grid-column: 1 / -1; font-family: 'Cinzel', serif; color: var(--blue); border-bottom: 2px solid var(--blue); padding: 0.5rem 0; margin: 0.5rem 0 0.5rem; text-align: center; font-size: 1.5rem; text-shadow: 0 0 15px var(--blue); letter-spacing: 4px; background: linear-gradient(90deg, transparent, rgba(10, 200, 185, 0.1), transparent); }
        .player-card { background: var(--card-bg); border: 1px solid var(--gold-dark); border-radius: 4px; padding: 0.6rem; text-align: center; position: relative; transition: 0.5s; cursor: default; }
        .player-card.active { border-color: var(--blue); box-shadow: 0 0 40px rgba(10, 200, 185, 0.3); transform: translateY(-8px); z-index: 2; }
        .player-card:hover:not(.active) { border-color: var(--gold); transform: translateY(-4px); }
        
        .section-label { font-size: 0.65rem; color: var(--gold); text-transform: uppercase; margin: 0.4rem 0 0.2rem; letter-spacing: 1px; opacity: 0.9; }
        .slot-img { width: 100%; aspect-ratio: 0.75; background: #000; border: 1px solid var(--gold-dark); object-fit: cover; transition: 0.5s; box-shadow: inset 0 0 30px black; }
        .slots-row { display: flex; gap: 6px; justify-content: center; }
        .items-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px; justify-content: center; }
        .item-icon { width: 100%; aspect-ratio: 1; border: 1px solid var(--gold-dark); transition: 0.3s; background: rgba(0,0,0,0.4); border-radius: 3px; object-fit: cover; }
        .item-icon:not([src]) { opacity: 0; }
        .item-icon[src] { opacity: 1; }
        .item-icon:hover { border-color: var(--gold); transform: scale(1.1); z-index: 3; }
        
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div class="container" id="setup-screen">
        <h1>CompLoL Random</h1>
        <div class="setup-card">
            <div class="form-group">
                <label>Quantidade de Integrantes (1-10)</label>
                <input type="number" id="player-count" min="1" max="10" value="5">
            </div>
            <div id="players-config"></div>
            <button class="btn" id="start-btn" style="margin-top: 2.5rem;">Montar Squad</button>
        </div>
    </div>

    <div class="container hidden" id="comp-screen" style="padding-top: 1rem;">
        <h1 id="view-title" style="margin-bottom: 1rem; font-size: 2.5rem;">Sua Composição</h1>
        <div style="text-align: center; margin-bottom: 0.5rem; display: flex; gap: 1rem; justify-content: center;">
            <button class="btn" id="next-btn" style="max-width: 220px; padding: 0.8rem; font-size: 1rem;">Gerar Próximo</button>
            <button class="btn" id="all-btn" style="max-width: 220px; padding: 0.8rem; font-size: 1rem; background: rgba(10,200,185,0.3); color: var(--blue); border: 1px solid var(--blue);">Gerar Todos</button>
        </div>
        <div id="comp-grid"></div>
    </div>

    <script>
        const ROLES = ['TOP', 'JUNGLE', 'MIDDLE', 'BOTTOM', 'UTILITY'];
        const ROLE_NAMES = { TOP: 'Topo', JUNGLE: 'Selva', MIDDLE: 'Meio', BOTTOM: 'Atirador', UTILITY: 'Suporte' };
        let state = { version: '', champions: [], items: [], spells: [], players: [], currentGenIndex: 0, 
                      pools: { team1: { champs: [], roles: [] }, team2: { champs: [], roles: [] } } };

        async function init() {
            const v = await fetch('https://ddragon.leagueoflegends.com/api/versions.json').then(r => r.json());
            state.version = v[0];
            const [c, i, s] = await Promise.all([
                fetch(`https://ddragon.leagueoflegends.com/cdn/${state.version}/data/pt_BR/champion.json`).then(r => r.json()),
                fetch(`https://ddragon.leagueoflegends.com/cdn/${state.version}/data/pt_BR/item.json`).then(r => r.json()),
                fetch(`https://ddragon.leagueoflegends.com/cdn/${state.version}/data/pt_BR/summoner.json`).then(r => r.json())
            ]);
            state.champions = Object.values(c.data);
            const allItems = Object.entries(i.data).map(([id, val]) => ({ id, ...val }));
            // Apenas itens do Summoner's Rift (mapa 11) compráveis sem requisito de campeão
            state.items = allItems.filter(it => it.maps && it.maps['11'] && it.gold.purchasable && !it.requiredChampion);
            // IDs fixos das botas finais do SR (não mudam com idioma)
            // 3006=Berserker's, 3009=Swiftness, 3020=Sorcerer's, 3047=Steelcaps, 3111=Mercury's, 3158=Ionian, 3174=Gluttonous
            const BOOTS_IDS = ['3006','3009','3020','3047','3111','3158','3174'];
            state.boots = allItems.filter(it => BOOTS_IDS.includes(it.id));
            state.legendaryItems = state.items.filter(it =>
                !it.tags.includes('Boots') && !it.into && !it.requiredItem &&
                !it.tags.includes('Consumable') && !it.tags.includes('Trinket') &&
                !it.name.includes('Doran') && !it.name.includes('Cristal de Runa') &&
                it.gold.total >= 2000
            );
            state.spells = Object.values(s.data).filter(s => s.modes.includes('CLASSIC'));
            renderSetup();
        }

        const renderSetup = () => {
            const count = document.getElementById('player-count').value;
            const container = document.getElementById('players-config');
            container.innerHTML = '';
            for(let i=0; i<count; i++) {
                container.innerHTML += `
                <div class="player-row" style="animation-delay: ${i*0.1}s">
                    <input type="text" placeholder="Invocador ${i+1}" class="p-name" value="Invocador ${i+1}">
                    <select class="p-role">
                        <option value="RANDOM">Rota Aleatória</option>
                        ${ROLES.map(r => `<option value="${r}">${ROLE_NAMES[r]}</option>`).join('')}
                    </select>
                </div>`;
            }
        };

        document.getElementById('player-count').addEventListener('input', renderSetup);
        document.getElementById('start-btn').onclick = () => {
            const names = [...document.querySelectorAll('.p-name')].map(i => i.value);
            const roles = [...document.querySelectorAll('.p-role')].map(s => s.value);
            state.players = names.map((n, i) => ({ name: n, fixedRole: roles[i], result: null }));
            state.pools = { 
                team1: { champs: [...state.champions], roles: [...ROLES] },
                team2: { champs: [...state.champions], roles: [...ROLES] }
            };
            document.getElementById('setup-screen').classList.add('hidden');
            document.getElementById('comp-screen').classList.remove('hidden');
            window.scrollTo(0,0);
            renderGrid();
        };

        const renderGrid = () => {
            const grid = document.getElementById('comp-grid');
            grid.innerHTML = '';
            state.players.forEach((p, i) => {
                if(i === 0) grid.innerHTML += `<div class="team-title">Equipe Azul</div>`;
                if(i === 5) grid.innerHTML += `<div class="team-title">Equipe Vermelha</div>`;
                grid.innerHTML += `
                <div class="player-card ${i === state.currentGenIndex ? 'active' : ''}" id="p-card-${i}">
                    <div style="color: var(--gold); font-weight: bold; font-family: Cinzel; font-size: 1rem; letter-spacing: 1px;">${p.name.toUpperCase()}</div>
                    
                    <div class="section-label">Rota</div>
                    <div id="res-role-${i}" style="font-size: 0.9rem; color: var(--blue); letter-spacing: 1px; font-family: Cinzel; min-height: 1.2rem;">AGUARDANDO...</div>
                    
                    <div class="section-label" style="margin-top: 0">Campeão</div>
                    <img class="slot-img" id="res-img-${i}" src="https://ddragon.leagueoflegends.com/cdn/img/champion/splash/Aatrox_0.jpg" style="filter: grayscale(1) brightness(0.25);">
                    
                    <div class="slots-row">
                        <div style="flex: 1">
                            <div class="section-label">Feitiços</div>
                            <div class="slots-row">
                                <img class="item-icon" id="res-s1-${i}">
                                <img class="item-icon" id="res-s2-${i}">
                            </div>
                        </div>
                        <div style="flex: 0.5">
                            <div class="section-label">Bota</div>
                            <div class="slots-row">
                                <img class="item-icon" id="res-bot-${i}">
                            </div>
                        </div>
                    </div>

                    <div class="section-label">Itens</div>
                    <div class="items-grid">
                        <img class="item-icon" id="res-i1-${i}">
                        <img class="item-icon" id="res-i2-${i}">
                        <img class="item-icon" id="res-i3-${i}">
                        <img class="item-icon" id="res-i4-${i}">
                        <img class="item-icon" id="res-i5-${i}">
                        <img class="item-icon" id="res-i6-${i}">
                    </div>
                </div>`;
            });
        };

        const rollSlot = async (type, elId, options, duration = 800) => {
            const el = document.getElementById(elId);
            let start = Date.now();
            return new Promise(res => {
                const interval = setInterval(() => {
                    const pick = options[Math.floor(Math.random() * options.length)];
                    if(type === 'text') el.innerText = pick.name.toUpperCase();
                    else el.src = pick.img;
                    
                    if(Date.now() - start > duration) {
                        clearInterval(interval);
                        res(pick);
                    }
                }, 70);
            });
        };

        const generatePlayer = async (idx, animated = true) => {
            const p = state.players[idx];
            const team = idx < 5 ? state.pools.team1 : state.pools.team2;
            const dur = animated ? undefined : 0;

            let role = p.fixedRole;
            if(role === 'RANDOM') {
                const r = await rollSlot('text', `res-role-${idx}`, team.roles.map(r => ({ name: ROLE_NAMES[r], val: r })), dur ?? 600);
                role = r.val;
            } else {
                document.getElementById(`res-role-${idx}`).innerText = ROLE_NAMES[role].toUpperCase();
            }
            team.roles = team.roles.filter(r => r !== role);

            const champ = await rollSlot('img', `res-img-${idx}`, team.champs.map(c => ({ name: c.name, val: c, img: `https://ddragon.leagueoflegends.com/cdn/img/champion/loading/${c.id}_0.jpg` })), dur ?? 800);
            document.getElementById(`res-img-${idx}`).style.filter = 'none';
            team.champs = team.champs.filter(c => c.id !== champ.val.id);

            const s1 = await rollSlot('img', `res-s1-${idx}`, state.spells.map(s => ({ name: s.name, val: s, img: `https://ddragon.leagueoflegends.com/cdn/${state.version}/img/spell/${s.id}.png` })), dur ?? 400);
            const s2 = await rollSlot('img', `res-s2-${idx}`, state.spells.filter(s => s.id !== s1.val.id).map(s => ({ name: s.name, val: s, img: `https://ddragon.leagueoflegends.com/cdn/${state.version}/img/spell/${s.id}.png` })), dur ?? 400);

            const boots = await rollSlot('img', `res-bot-${idx}`, state.boots.map(i => ({ name: i.name, val: i, img: `https://ddragon.leagueoflegends.com/cdn/${state.version}/img/item/${i.id}.png` })), dur ?? 400);

            const isSupp = role === 'UTILITY';
            const itemPool = state.legendaryItems.filter(it =>
                isSupp ? true : !it.tags.includes('GoldPer') && !it.tags.includes('Vision')
            );
            let activeItems = [];
            for(let i=1; i<=6; i++) {
                const filtered = itemPool.filter(it => !activeItems.includes(it.id));
                const item = await rollSlot('img', `res-i${i}-${idx}`, filtered.map(it => ({ name: it.name, val: it, img: `https://ddragon.leagueoflegends.com/cdn/${state.version}/img/item/${it.id}.png` })), dur ?? 300);
                activeItems.push(item.val.id);
            }

            document.getElementById(`res-s1-${idx}`).title = s1.val.name;
            document.getElementById(`res-s2-${idx}`).title = s2.val.name;
            document.getElementById(`res-bot-${idx}`).title = boots.val.name;
            activeItems.forEach((id, i) => {
                const itemDef = state.legendaryItems.find(it => it.id === id);
                document.getElementById(`res-i${i+1}-${idx}`).title = itemDef ? itemDef.name : '';
            });

            p.result = { role, champ: champ.val, spells: [s1.val, s2.val], boots: boots.val, items: activeItems };
        };

        const setButtons = (generating) => {
            const nb = document.getElementById('next-btn');
            const ab = document.getElementById('all-btn');
            nb.disabled = generating;
            ab.disabled = generating;
            if(!generating) { nb.innerText = 'Gerar Próximo'; ab.innerText = 'Gerar Todos'; }
        };

        document.getElementById('next-btn').onclick = async () => {
            if(state.currentGenIndex >= state.players.length) return;
            setButtons(true);
            document.getElementById('next-btn').innerText = 'Gerando...';
            const idx = state.currentGenIndex;
            document.getElementById(`p-card-${idx}`).classList.add('active');
            await generatePlayer(idx, true);
            document.getElementById(`p-card-${idx}`).classList.remove('active');
            state.currentGenIndex++;
            if(state.currentGenIndex < state.players.length) {
                document.getElementById(`p-card-${state.currentGenIndex}`).classList.add('active');
                setButtons(false);
            } else {
                document.getElementById('next-btn').style.display = 'none';
                document.getElementById('all-btn').style.display = 'none';
            }
        };

        document.getElementById('all-btn').onclick = async () => {
            if(state.currentGenIndex >= state.players.length) return;
            setButtons(true);
            document.getElementById('all-btn').innerText = 'Gerando...';

            // Esconde todos os cards não gerados ainda
            for(let i = state.currentGenIndex; i < state.players.length; i++)
                document.getElementById(`p-card-${i}`).style.opacity = '0.1';

            // Gera cada player sequencialmente sem animações
            while(state.currentGenIndex < state.players.length) {
                const idx = state.currentGenIndex;
                await generatePlayer(idx, false);
                state.currentGenIndex++;
            }

            // Exibe todos os cards de uma vez com fade-in
            for(let i = 0; i < state.players.length; i++) {
                const card = document.getElementById(`p-card-${i}`);
                card.style.transition = 'opacity 0.5s ease-out';
                card.style.opacity = '1';
            }

            document.getElementById('next-btn').style.display = 'none';
            document.getElementById('all-btn').style.display = 'none';
        };

        init();
    </script>
</body>
</html>
